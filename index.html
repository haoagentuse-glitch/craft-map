<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工藝資源地圖 · 陶瓷</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
  <script>
    /* 防止深色模式閃爍，head 內立即執行 */
    (function () {
      var t = localStorage.getItem('cmap-theme');
      if (t === 'dark') document.documentElement.dataset.theme = 'dark';
    })();
  </script>
</head>

<body>
  <header>
    <div class="wrap">

      <!-- 品牌列 -->
      <div class="htop">
        <img class="logo" src="assets/favicon.svg" alt="工藝資源地圖標誌" width="34" height="34">
        <div class="titles">
          <h1>工藝資源地圖</h1>
          <span class="en">Craft Resource Directory</span>
        </div>
        <div class="hright">
          <!-- 深色模式切換 -->
          <button id="themetog" class="icbtn" title="切換深色模式" aria-label="切換深色模式">
            <svg class="ic-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z" />
            </svg>
            <svg class="ic-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="5" />
              <line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" />
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
              <line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" />
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
          </button>
          <!-- 視圖切換 -->
          <div class="viewtog" id="viewtog" role="group" aria-label="切換視圖">
            <button class="vtbtn on" data-view="grid" title="卡片視圖" aria-pressed="true">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" rx="1" />
                <rect x="14" y="3" width="7" height="7" rx="1" />
                <rect x="3" y="14" width="7" height="7" rx="1" />
                <rect x="14" y="14" width="7" height="7" rx="1" />
              </svg>
            </button>
            <button class="vtbtn" data-view="list" title="列表視圖" aria-pressed="false">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round">
                <line x1="8" y1="6" x2="21" y2="6" /><line x1="8" y1="12" x2="21" y2="12" />
                <line x1="8" y1="18" x2="21" y2="18" />
                <line x1="3" y1="6" x2="3.01" y2="6" /><line x1="3" y1="12" x2="3.01" y2="12" />
                <line x1="3" y1="18" x2="3.01" y2="18" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- 品牌說明 -->
      <p class="sub">工藝資源通訊錄。任何人都能成為協作者——投稿新增、回報有誤、補充建議。</p>

      <!-- 領域頁籤 -->
      <div class="domains" id="domains"></div>

    </div>
  </header>

  <!-- 搜尋 + 篩選（細長吸頂列；品牌區會正常捲走） -->
  <div class="filterbar">
    <div class="wrap">
      <div class="toolbar">
        <div class="searchrow">
          <label class="search">
            <span class="ic">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
            </span>
            <input id="q" type="search" placeholder="搜尋名稱、營業項目、地址…" autocomplete="off">
          </label>
          <select id="city">
            <option value="">全部地區</option>
          </select>
        </div>
        <div class="chips" id="cats"></div>
      </div>
    </div>
  </div>

  <div class="count" id="count"></div>

  <main>
    <div class="grid" id="grid"></div>
  </main>

  <!-- 固定右下角投稿按鈕 -->
  <button class="fab" id="fab">＋ 我發現一家，新增</button>

  <p class="note" id="srcnote"></p>
  <p class="note">初始資料來源：國立臺灣藝術大學 工藝設計學系</p>
  <p class="note contact">聯絡我 ／ 意見回饋：<a
      href="https://mail.google.com/mail/?view=cm&fs=1&to=haoagentuse%2Bcraftmap@gmail.com&su=【工藝資源地圖】意見回饋"
      target="_blank">haoagentuse@gmail.com</a></p>

  <!-- 站內新增／回報的彈窗 -->
  <div id="modal" class="modal" style="display:none">
    <div class="modal-card">
      <button class="modal-x" id="modalClose" aria-label="關閉">×</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- 載入順序：設定 → 資料 → 程式邏輯 -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>

  <script>
    /* ── 深色模式 ── */
    document.getElementById('themetog').addEventListener('click', function () {
      var isDark = document.documentElement.dataset.theme === 'dark';
      document.documentElement.dataset.theme = isDark ? '' : 'dark';
      localStorage.setItem('cmap-theme', isDark ? '' : 'dark');
    });

    /* ── 視圖切換（grid / list），純 CSS 控制，不動 app.js ── */
    var viewtog = document.getElementById('viewtog');
    viewtog.querySelectorAll('.vtbtn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        viewtog.querySelectorAll('.vtbtn').forEach(function (b) {
          b.classList.remove('on');
          b.setAttribute('aria-pressed', 'false');
        });
        btn.classList.add('on');
        btn.setAttribute('aria-pressed', 'true');
        document.body.dataset.view = btn.dataset.view;
      });
    });
  </script>
</body>

</html>
