<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工藝資源地圖 · 陶瓷</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <header>
    <div class="wrap">
      <div class="brand">
        <img class="logo" src="assets/favicon.svg" alt="工藝資源地圖標誌" width="38" height="38">
        <div class="titles">
          <h1>工藝資源地圖</h1>
          <span class="en">Craft Resource Directory</span>
        </div>
      </div>
      <p class="sub">任何人都能成為協作者 ｜ 初始資料來源：國立臺灣藝術大學 工藝設計學系</p>
      <div class="domains" id="domains"></div>
      <div class="toolbar">
        <div class="searchrow">
          <label class="search">
            <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg></span>
            <input id="q" type="search" placeholder="搜尋名稱、營業項目、地址…">
          </label>
          <select id="city">
            <option value="">全部地區</option>
          </select>
        </div>
        <div class="chips" id="cats"></div>
      </div>
    </div>
  </header>

  <div class="count" id="count"></div>

  <main>
    <div class="grid" id="grid"></div>
  </main>

  <button class="fab" id="fab">＋ 我發現一家，新增</button>
  <p class="note" id="srcnote"></p>
  <p class="note contact">聯絡我 ／ 意見回饋：<a
      href="https://mail.google.com/mail/?view=cm&fs=1&to=haoagentuse%2Bcraftmap@gmail.com&su=【工藝資源地圖】意見回饋"
      target="_blank">haoagentuse@gmail.com</a></p>

  <!-- 站內新增／回報的彈窗 -->
  <div id="modal" class="modal" style="display:none">
    <div class="modal-card">
      <button class="modal-x" id="modalClose" aria-label="關閉">×</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- 載入順序：設定 → 資料 → 程式邏輯 -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>

</html>
